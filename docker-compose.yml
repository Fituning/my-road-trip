version: '3.8'

services:
  # ==========================================
  # DATABASE: PocketBase
  # ==========================================
  roadtrip-db:
    image: ghcr.io/muchobien/pocketbase:latest
    container_name: roadtrip-db
    restart: always
    volumes:
      - ./pb_data:/pb_data
      - ./pb_public:/pb_public
    # Pas de ports ici, on passe par le réseau proxy interne !
    networks:
      - default
    healthcheck:
      test: [ "CMD", "wget", "--spider", "-q", "http://127.0.0.1:8090/api/health" ]
      interval: 10s
      timeout: 5s
      retries: 3

  # ==========================================
  # FRONTEND: Nuxt 3 App PWA
  # ==========================================
  roadtrip:
    build:
      context: .
      dockerfile: Dockerfile # Assure-toi qu'il build pour la prod !
    container_name: roadtrip
    restart: always
    environment:
      - NODE_ENV=production
      - HOST=0.0.0.0
      # URL Client (Publique) : Ce que le navigateur utilise via Cloudflare
      - NUXT_PUBLIC_POCKETBASE_URL=https://roadtrip-db.azth.org
      # URL Serveur (Interne) : Nuxt parle directement à la BDD via le réseau Docker
      - POCKETBASE_INTERNAL_URL=http://roadtrip-db:8090
    networks:
      - default
    depends_on:
      roadtrip-db:
        condition: service_healthy

networks:
  default:
    external:
      name: proxy_network